name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build CSS
        run: npm run tailwind:build
      - name: Build Windows EXE
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:win:all
      - name: Get version from package.json
        id: package-version
        run: |
          $version = node -p "require('./package.json').version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: "الإصدار ${{ steps.package-version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./dist/Restaurant-Setup-${{ steps.package-version.outputs.VERSION }}.exe
            ./dist/Restaurant-Setup-${{ steps.package-version.outputs.VERSION }}.msi
            ./dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
