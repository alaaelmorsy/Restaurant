name: Build Windows EXE

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

concurrency:
  group: build-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    if: github.ref_type == 'branch'
    steps:
      - uses: actions/checkout@v5

      - name: Get version from package.json
        id: pkg
        run: |
          $version = node -p "require('./package.json').version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=v$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Check if release already exists
        id: check
        run: |
          gh release view ${{ steps.pkg.outputs.TAG }} 2>$null
          if ($LASTEXITCODE -eq 0) {
            echo "EXISTS=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "EXISTS=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        if: steps.check.outputs.EXISTS == 'false'
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        if: steps.check.outputs.EXISTS == 'false'
        run: npm ci --legacy-peer-deps

      - name: Build CSS
        if: steps.check.outputs.EXISTS == 'false'
        run: npm run tailwind:build

      - name: Build Windows EXE
        if: steps.check.outputs.EXISTS == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:win:all

      - name: Create Release and Upload Assets
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          gh release create ${{ steps.pkg.outputs.TAG }} `
            --title "الإصدار ${{ steps.pkg.outputs.VERSION }}" `
            --target ${{ github.sha }} `
            --latest `
            "./dist/Restaurant-Setup-${{ steps.pkg.outputs.VERSION }}.exe" `
            "./dist/Restaurant-Setup-${{ steps.pkg.outputs.VERSION }}.msi" `
            "./dist/latest.yml"
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
