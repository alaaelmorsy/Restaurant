name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: pkg
        run: |
          $version = node -p "require('./package.json').version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Validate tag matches package.json version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "v${{ steps.pkg.outputs.VERSION }}"
          if ($tag -ne $version) {
            Write-Error "Tag ($tag) does not match package.json version ($version). Please update package.json before pushing the tag."
            exit 1
          }
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win:all

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: "الإصدار ${{ steps.pkg.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./dist/Restaurant-Setup-${{ steps.pkg.outputs.VERSION }}.exe
            ./dist/Restaurant-Setup-${{ steps.pkg.outputs.VERSION }}.msi
            ./dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
