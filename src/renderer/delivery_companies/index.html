<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>شركات التوصيل - POS SA</title>
    <link href="../../styles/output.css" rel="stylesheet">
    <style>
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Regular.ttf') format('truetype');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Bold.ttf') format('truetype');
        font-weight: 700;
        font-display: swap;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Black.ttf') format('truetype');
        font-weight: 900;
        font-display: swap;
      }
      body{
        font-family: 'Cairo', sans-serif;
        font-weight: 700;
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">
    <header class="sticky top-0 z-50 bg-white border-b-2 border-slate-200 shadow-lg">
      <div class="flex items-center justify-between px-4 py-3 gap-3">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-gradient-to-br from-cyan-600 to-cyan-700 rounded-2xl flex items-center justify-center text-white text-xl font-black shadow-xl">🚚</div>
          <span class="text-xl font-black text-slate-800 hidden sm:inline">إدارة شركات التوصيل</span>
        </div>
        <button id="btnBackHome" class="px-4 py-2.5 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-xl font-bold">العودة للرئيسية</button>
      </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-5">
      <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-4 mb-5 flex gap-3">
        <input id="dSearch" type="text" placeholder="البحث باسم الشركة..." class="flex-1 px-4 py-3 border-2 border-slate-300 rounded-xl" />
        <button id="addBtn" class="px-4 py-3 bg-gradient-to-r from-cyan-600 to-cyan-700 text-white rounded-xl font-bold">إضافة شركة</button>
      </div>

      <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr class="bg-slate-50 border-b border-slate-200">
                <th class="px-5 py-4 text-right">#</th>
                <th class="px-5 py-4 text-right">الاسم</th>
                <th class="px-5 py-4 text-right">نسبة الخصم</th>
                <th class="px-5 py-4 text-center">الحالة</th>
                <th class="px-5 py-4 text-center">الإجراءات</th>
              </tr>
            </thead>
            <tbody id="dTbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <dialog id="dlg" class="rounded-2xl p-0 w-[95vw] max-w-xl">
      <div class="bg-cyan-700 text-white px-6 py-4"><span id="dlgTitle" class="font-bold">إضافة شركة</span></div>
      <div class="p-6 space-y-4">
        <input id="f_name" placeholder="اسم الشركة" class="w-full px-4 py-3 border rounded-xl" />
        <input id="f_discount" type="number" min="0" max="100" step="0.01" placeholder="نسبة الخصم %" class="w-full px-4 py-3 border rounded-xl" />
        <div class="flex justify-end gap-2">
          <button id="dlgCancel" class="px-4 py-2 border rounded-xl">إلغاء</button>
          <button id="dlgSave" class="px-4 py-2 bg-cyan-700 text-white rounded-xl">حفظ</button>
        </div>
      </div>
    </dialog>

    <dialog id="confirmDialog" class="rounded-2xl p-0 w-[95vw] max-w-md backdrop:bg-black/40">
      <div class="bg-gradient-to-r from-red-600 to-red-700 text-white px-6 py-4">
        <span id="confirmTitle" class="font-black">تأكيد الحذف</span>
      </div>
      <div class="p-6">
        <p id="confirmMessage" class="text-slate-700 font-semibold leading-7 mb-6">هل أنت متأكد من الحذف؟</p>
        <div class="flex items-center justify-end gap-2">
          <button id="confirmCancel" class="px-4 py-2 border-2 border-slate-300 text-slate-700 rounded-xl font-bold hover:bg-slate-50">إلغاء</button>
          <button id="confirmOk" class="px-4 py-2 bg-gradient-to-r from-red-600 to-red-700 text-white rounded-xl font-bold hover:from-red-700 hover:to-red-800">حذف نهائي</button>
        </div>
      </div>
    </dialog>

    <script src="./renderer.js"></script>
  </body>
</html>
