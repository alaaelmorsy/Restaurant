<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تقرير جميع الفواتير</title>
    <link href="../../styles/output.css" rel="stylesheet">
    <style>
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Regular.ttf') format('truetype');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-SemiBold.ttf') format('truetype');
        font-weight: 600;
        font-display: swap;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Bold.ttf') format('truetype');
        font-weight: 700;
        font-display: swap;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-ExtraBold.ttf') format('truetype');
        font-weight: 800;
        font-display: swap;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Black.ttf') format('truetype');
        font-weight: 900;
        font-display: swap;
      }
      
      body {
        font-family: 'Cairo', sans-serif;
      }
      
      .credit-row td {
        background: #fff7ed;
      }

      /* شبكة كاملة للجداول (عرض الشاشة) */
      .grid-table{ 
        border: 1px solid #cbd5e1; 
        border-collapse: collapse; 
        table-layout: auto;
      }
      .grid-table th, .grid-table td{ 
        border: 1px solid #e2e8f0; 
        padding: 8px 12px;
      }
      .grid-table tfoot th{ 
        border-top: 2px solid #cbd5e1;
        background: #dbeafe;
        font-weight: 900;
      }
      
      /* تنسيق الجداول العامة */
      table tbody tr:hover{ background: #f9fafb; }
      table tbody tr{ border-bottom: 1px solid #e5e7eb; }
      
      /* طباعة: إخفاء عمود "عرض" وضبط المقاس 80x297mm */
      @media print {
        header, .range-actions, .range-inputs, #paginationContainer { display: none !important; }
        /* إخفاء عمود "عرض" (آخر عمود) في الرأس، الجسم، والذيل */
        table thead th:last-child,
        table tbody td:last-child,
        table tfoot th:last-child { display: none !important; }
        /* إخفاء عمود "نوع المستند" (العمود الثاني) في جدول جميع الفواتير */
        .grid-table thead th:nth-child(2),
        .grid-table tbody td:nth-child(2),
        .grid-table tfoot th:nth-child(2) { display: none !important; }

        
        /* إزالة المقاس الحراري في الطباعة العامة لضمان عرض A4 عند التصدير */
        @page { margin: 1cm; }
        html, body { width: auto; max-width: none; margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 16px auto; padding: 0 12px; }
        div[style*="overflow:auto"]{ overflow: visible !important; }
        table { table-layout: fixed; font-size: 8px !important; line-height: 1.15; }
        th, td { padding: 1px 2px; }
        /* تحسين الالتفاف: السماح للنصوص العربية بالالتفاف ومنع التفاف الأرقام */
        .grid-table th, .grid-table td { word-break: break-word; overflow-wrap: anywhere; white-space: normal; }
        .num, .num * { white-space: nowrap !important; word-break: keep-all !important; overflow-wrap: normal !important; direction: ltr; text-align: left; }
        /* السماح بالتفاف التاريخ فقط في الطباعة */
        .grid-table tbody td:nth-child(4).num { white-space: normal !important; word-break: break-word !important; overflow-wrap: anywhere !important; }
        /* توزيع أعمدة جدول جميع الفواتير بعد إخفاء (نوع المستند) و(عرض):
           1 رقم | 3 العميل | 4 التاريخ | 5 طريقة الدفع | 6 قبل الضريبة | 7 الضريبة | 8 الإجمالي */
        .grid-table th:nth-child(1), .grid-table td:nth-child(1){ width:12%; }
        .grid-table th:nth-child(3), .grid-table td:nth-child(3){ width:24%; }
        .grid-table th:nth-child(4), .grid-table td:nth-child(4){ width:22%; }
        .grid-table th:nth-child(5), .grid-table td:nth-child(5){ width:12%; }
        .grid-table th:nth-child(6), .grid-table td:nth-child(6){ width:10%; }
        .grid-table th:nth-child(7), .grid-table td:nth-child(7){ width:10%; }
        .grid-table th:nth-child(8), .grid-table td:nth-child(8){ width:10%; }
      }
      @font-face{
        font-family: 'saudi_riyal';
        src: url('../../../assets/fonts/saudi-riyal.woff') format('woff'),
             url('../../../assets/fonts/saudi-riyal.ttf') format('truetype');
        font-display: swap;
        unicode-range: U+E900;
      }
      :root{ --m-left: 0mm; --m-right: 0mm; }
    </style>
  </head>
  <body class="bg-gradient-to-br from-gray-50 via-blue-50 to-purple-50 min-h-screen">
    <header class="bg-white shadow-lg sticky top-0 z-50 border-b-4 border-blue-500">
      <div class="container mx-auto px-6 py-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center shadow-xl">
              <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
              </svg>
            </div>
            <div>
              <h1 class="text-2xl font-black text-gray-800">تقرير جميع الفواتير</h1>
              <p class="text-sm text-gray-500 font-semibold">نظام إدارة المطاعم</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <button id="btnBack" class="px-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white font-bold rounded-xl hover:from-blue-700 hover:to-blue-800 shadow-lg">
              الرجوع
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="container mx-auto px-6 py-8 max-w-7xl">
      <div class="bg-white rounded-2xl shadow-xl p-6 mb-6 border-2 border-gray-100">
        <!-- قسم الفلاتر -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-5">
          <!-- فلتر المستخدم -->
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
              <span class="text-lg">👤</span>
              المستخدم
            </label>
            <select id="userFilter" class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm hover:border-blue-400 transition-colors">
              <option value="">الكل</option>
            </select>
          </div>
          
          <!-- تاريخ من -->
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
              <span class="text-lg">📅</span>
              من
            </label>
            <input id="fromAt" type="datetime-local" class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm hover:border-blue-400 transition-colors" />
          </div>
          
          <!-- تاريخ إلى -->
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
              <span class="text-lg">📅</span>
              إلى
            </label>
            <input id="toAt" type="datetime-local" class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm hover:border-blue-400 transition-colors" />
          </div>
          
          <!-- زر التطبيق -->
          <div class="flex items-end">
            <button id="applyRangeBtn" class="w-full px-6 py-3 bg-gradient-to-r from-purple-600 to-purple-700 text-white font-black rounded-xl hover:from-purple-700 hover:to-purple-800 shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2">
              <span class="text-lg">✓</span>
              تطبيق
            </button>
          </div>
        </div>
        
        <!-- قسم الأزرار -->
        <div class="flex flex-wrap items-center justify-between gap-3 pt-4 border-t-2 border-gray-100">
          <div class="text-gray-600 font-bold flex items-center gap-2" id="range">
            <span class="text-lg">📊</span>
          </div>
          <div class="flex flex-wrap gap-3">
            <button id="exportPdfBtn" class="px-5 py-3 bg-gradient-to-r from-red-500 to-red-600 text-white font-black rounded-xl hover:from-red-600 hover:to-red-700 shadow-lg hover:shadow-xl transition-all flex items-center gap-2">
              <span class="text-lg">📄</span>
              تصدير PDF
            </button>
            <button id="exportExcelBtn" class="px-5 py-3 bg-gradient-to-r from-green-500 to-green-600 text-white font-black rounded-xl hover:from-green-600 hover:to-green-700 shadow-lg hover:shadow-xl transition-all flex items-center gap-2">
              <span class="text-lg">📊</span>
              تصدير Excel
            </button>
            <button id="printReportBtn" class="px-5 py-3 bg-gradient-to-r from-blue-500 to-blue-600 text-white font-black rounded-xl hover:from-blue-600 hover:to-blue-700 shadow-lg hover:shadow-xl transition-all flex items-center gap-2">
              <span class="text-lg">🖨️</span>
              طباعة التقرير
            </button>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-xl p-6 mb-6 border-2 border-gray-100">
        <h3 class="text-2xl font-black text-gray-800 mb-4 pb-3 border-b-2 border-blue-500">جميع الفواتير ضمن الفترة</h3>
        <div class="overflow-x-auto">
          <table class="grid-table w-full">
            <thead>
              <tr>
                <th class="bg-gradient-to-r from-slate-50 to-slate-100 text-blue-700 font-bold">رقم</th>
                <th class="bg-gradient-to-r from-slate-50 to-slate-100 text-blue-700 font-bold">نوع المستند</th>
                <th class="bg-gradient-to-r from-slate-50 to-slate-100 text-blue-700 font-bold">العميل</th>
                <th class="bg-gradient-to-r from-slate-50 to-slate-100 text-blue-700 font-bold">التاريخ</th>
                <th class="bg-gradient-to-r from-slate-50 to-slate-100 text-blue-700 font-bold">طريقة الدفع</th>
                <th class="bg-gradient-to-r from-slate-50 to-slate-100 text-blue-700 font-bold">المبلغ قبل الضريبة</th>
                <th class="bg-gradient-to-r from-slate-50 to-slate-100 text-blue-700 font-bold">الضريبة</th>
                <th class="bg-gradient-to-r from-slate-50 to-slate-100 text-blue-700 font-bold">الإجمالي</th>
                <th class="bg-gradient-to-r from-slate-50 to-slate-100 text-blue-700 font-bold">شركة التوصيل</th>
                <th class="bg-gradient-to-r from-slate-50 to-slate-100 text-blue-700 font-bold">خصم التوصيل</th>
                <th class="bg-gradient-to-r from-slate-50 to-slate-100 text-blue-700 font-bold">عرض</th>
              </tr>
            </thead>
            <tbody id="invTbody"></tbody>
            <tfoot>
              <tr>
                <th colspan="7" class="text-gray-800">الإجماليات</th>
                <th id="sumPre" class="text-gray-800">0.00</th>
                <th id="sumVat" class="text-gray-800">0.00</th>
                <th id="sumGrand" class="text-gray-800">0.00</th>
                <th title="عدد الفواتير"><span class="text-gray-500">عدد الفواتير:</span> <b id="sumCount" class="text-gray-800">0</b></th>
              </tr>
            </tfoot>
          </table>
        </div>
        
        <!-- أزرار التنقل بين الصفحات -->
        <div id="paginationContainer" class="mt-6 pt-4 border-t-2 border-gray-100" style="display:none;"></div>
      </div>

      <div class="bg-white rounded-2xl shadow-xl p-6 border-2 border-gray-100">
        <h3 class="text-2xl font-black text-gray-800 mb-4 pb-3 border-b-2 border-blue-500">إجماليات طرق الدفع</h3>
        <div id="payTotals" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;"></div>
      </div>

    </div>
    <script src="./print-margins.js"></script>
    <script src="./all_invoices.js"></script>
  </body>
</html>
